<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  iframe {
    display: block;
    width: 100%;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
    border: none;
  }
</style>
</head>
<body>
  <iframe
    src="https://heritage-vision-ai-jnl2.onrender.com"
    title="Heritage Vision AI">
  </iframe>
</body>
</html>
